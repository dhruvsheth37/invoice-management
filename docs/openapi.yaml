openapi: 3.0.3
info:
  title: Invoice Management API
  version: 1.0.0
  description: >-
    Multi-tenant invoice API. Production obtains tenant_id and user_id from a
    validated bearer token. Development may use X-Tenant-Id and
    X-Development-User-Id through the local authentication handler.
servers:
  - url: http://localhost:5080
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantId:
      name: X-Tenant-Id
      in: header
      required: false
      description: Development/test tenant input only; production uses the validated tenant_id claim.
      schema: { type: string, format: uuid }
    DevelopmentUserId:
      name: X-Development-User-Id
      in: header
      required: false
      description: Development-only positive integer user ID; defaults to 1.
      schema: { type: integer, minimum: 1, default: 1 }
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema: { type: string, maxLength: 64, pattern: '^[A-Za-z0-9._:-]+$' }
    IdempotencyKey: { name: Idempotency-Key, in: header, required: true, schema: { type: string, maxLength: 100 } }
    IfMatch: { name: If-Match, in: header, required: true, schema: { type: string } }
    InvoiceId: { name: invoiceId, in: path, required: true, schema: { type: string, format: uuid } }
  schemas:
    InvoiceLineInput:
      type: object
      required: [description, quantity, unitPrice, taxRate]
      properties:
        description: { type: string, maxLength: 500 }
        quantity: { type: number, exclusiveMinimum: 0 }
        unitPrice: { type: number, minimum: 0 }
        taxRate: { type: number, minimum: 0, maximum: 1 }
    CreateInvoice:
      type: object
      required: [customerId, customerLocationId, currencyCode, lineItems]
      properties:
        customerId: { type: string, format: uuid }
        customerLocationId: { type: string, format: uuid }
        currencyCode: { type: string, minLength: 3, maxLength: 3 }
        dueDate: { type: string, format: date, nullable: true }
        notes: { type: string, maxLength: 1000, nullable: true }
        lineItems: { type: array, minItems: 1, maxItems: 100, items: { $ref: '#/components/schemas/InvoiceLineInput' } }
    InvoiceSearch:
      type: object
      properties:
        pageSize: { type: integer, default: 25, minimum: 1, maximum: 100 }
        status: { type: string, enum: [Draft, Issued, Paid, Void], nullable: true }
        customerId: { type: string, format: uuid, nullable: true }
        from: { type: string, format: date, nullable: true }
        to: { type: string, format: date, nullable: true }
        dueFrom: { type: string, format: date, nullable: true }
        dueTo: { type: string, format: date, nullable: true }
        invoiceNumber: { type: string, nullable: true }
        sort: { type: string, nullable: true }
        continuationToken: { type: string, nullable: true }
        includeTotalCount: { type: boolean, default: false }
    InvoiceSearchResult:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/InvoiceListItem' } }
        pageSize: { type: integer }
        totalCount: { type: integer, nullable: true }
        continuationToken: { type: string, nullable: true }
    InvoiceListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        invoiceNumber: { type: string, nullable: true }
        status: { type: string, enum: [Draft, Issued, Paid, Void] }
        customerId: { type: string, format: uuid }
        currencyCode: { type: string, minLength: 3, maxLength: 3 }
        total: { type: number }
        issueDate: { type: string, format: date, nullable: true }
        dueDate: { type: string, format: date, nullable: true }
        createdUtc: { type: string, format: date-time }
    IssueInvoice:
      type: object
      properties:
        issueDate: { type: string, format: date, nullable: true }
        dueDate: { type: string, format: date, nullable: true }
    MarkInvoicePaid:
      type: object
      required: [paidDate, reference]
      properties:
        paidDate: { type: string, format: date }
        reference: { type: string, maxLength: 100 }
    VoidInvoice:
      type: object
      required: [reason]
      properties:
        reason: { type: string, maxLength: 500 }
    Invoice:
      type: object
      properties:
        id: { type: string, format: uuid }
        customerId: { type: string, format: uuid }
        customerLocationId: { type: string, format: uuid }
        invoiceNumber: { type: string, nullable: true }
        status: { type: string, enum: [Draft, Issued, Paid, Void] }
        currencyCode: { type: string }
        subtotal: { type: number }
        taxTotal: { type: number }
        total: { type: number }
        issueDate: { type: string, format: date, nullable: true }
        dueDate: { type: string, format: date, nullable: true }
        paidDate: { type: string, format: date, nullable: true }
        paymentReference: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        voidReason: { type: string, nullable: true }
        createdUtc: { type: string, format: date-time }
        modifiedUtc: { type: string, format: date-time, nullable: true }
        eTag: { type: string }
    InvoiceAmountSummary:
      type: object
      properties:
        count: { type: integer }
        amount: { type: number }
    InvoiceCurrencySummary:
      type: object
      properties:
        currencyCode: { type: string }
        draft: { $ref: '#/components/schemas/InvoiceAmountSummary' }
        issued: { $ref: '#/components/schemas/InvoiceAmountSummary' }
        paid: { $ref: '#/components/schemas/InvoiceAmountSummary' }
        void: { $ref: '#/components/schemas/InvoiceAmountSummary' }
        overdue: { $ref: '#/components/schemas/InvoiceAmountSummary' }
    InvoiceDashboard:
      type: object
      properties:
        asOf: { type: string, format: date }
        currencyBreakdown:
          type: array
          items: { $ref: '#/components/schemas/InvoiceCurrencySummary' }
    Problem:
      type: object
      properties:
        status: { type: integer }
        title: { type: string }
        detail: { type: string }
        errorCode: { type: string }
        traceId: { type: string }
        correlationId: { type: string, nullable: true }
  responses:
    Problem:
      description: Request failed
      content:
        application/problem+json: { schema: { $ref: '#/components/schemas/Problem' } }
paths:
  /api/v1/invoices:
    post:
      summary: Create a Draft invoice
      parameters: [{ $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateInvoice' } } }
      responses:
        '201': { description: Draft created, content: { application/json: { schema: { $ref: '#/components/schemas/Invoice' } } } }
        '409': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /api/v1/invoices/search:
    post:
      summary: List tenant invoices
      parameters: [{ $ref: '#/components/parameters/TenantId' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/InvoiceSearch' } } }
      responses:
        '200':
          description: Cursor-paged invoice list
          content: { application/json: { schema: { $ref: '#/components/schemas/InvoiceSearchResult' } } }
        '422': { $ref: '#/components/responses/Problem' }
  /api/v1/invoices/{invoiceId}:
    get:
      summary: Get invoice details
      parameters: [{ $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/InvoiceId' }]
      responses:
        '200': { description: Invoice details, content: { application/json: { schema: { $ref: '#/components/schemas/Invoice' } } } }
        '404': { $ref: '#/components/responses/Problem' }
  /api/v1/invoices/{invoiceId}/issue:
    post:
      summary: Issue a Draft invoice
      parameters: [{ $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/IdempotencyKey' }, { $ref: '#/components/parameters/IfMatch' }, { $ref: '#/components/parameters/InvoiceId' }]
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: '#/components/schemas/IssueInvoice' } } }
      responses: { '200': { description: Issued invoice, content: { application/json: { schema: { $ref: '#/components/schemas/Invoice' } } } }, '409': { $ref: '#/components/responses/Problem' }, '422': { $ref: '#/components/responses/Problem' }, '428': { $ref: '#/components/responses/Problem' } }
  /api/v1/invoices/{invoiceId}/mark-paid:
    post:
      summary: Mark an Issued invoice paid
      parameters: [{ $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/IdempotencyKey' }, { $ref: '#/components/parameters/IfMatch' }, { $ref: '#/components/parameters/InvoiceId' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/MarkInvoicePaid' } } }
      responses: { '200': { description: Paid invoice, content: { application/json: { schema: { $ref: '#/components/schemas/Invoice' } } } }, '409': { $ref: '#/components/responses/Problem' }, '422': { $ref: '#/components/responses/Problem' }, '428': { $ref: '#/components/responses/Problem' } }
  /api/v1/invoices/{invoiceId}/void:
    post:
      summary: Void a Draft or Issued invoice
      parameters: [{ $ref: '#/components/parameters/TenantId' }, { $ref: '#/components/parameters/IdempotencyKey' }, { $ref: '#/components/parameters/IfMatch' }, { $ref: '#/components/parameters/InvoiceId' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/VoidInvoice' } } }
      responses: { '200': { description: Voided invoice, content: { application/json: { schema: { $ref: '#/components/schemas/Invoice' } } } }, '409': { $ref: '#/components/responses/Problem' }, '422': { $ref: '#/components/responses/Problem' }, '428': { $ref: '#/components/responses/Problem' } }
  /api/v1/dashboard/invoice-summary:
    get:
      summary: Get currency-separated invoice totals
      parameters: [{ $ref: '#/components/parameters/TenantId' }, { name: asOf, in: query, schema: { type: string, format: date } }]
      responses: { '200': { description: Dashboard summary, content: { application/json: { schema: { $ref: '#/components/schemas/InvoiceDashboard' } } } } }
